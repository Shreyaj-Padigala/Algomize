<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algomize — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-primary);
    }

    .auth-card {
      width: 400px;
      max-width: 90vw;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .auth-header {
      padding: 24px 24px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .auth-logo {
      color: var(--accent);
      font-size: 28px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .auth-title {
      font-size: 14px;
      color: var(--text-primary);
      margin-top: 8px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .auth-subtitle {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .auth-body {
      padding: 24px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .form-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 10px 12px;
      font-size: 13px;
      font-family: var(--mono);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    .auth-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      font-family: var(--mono);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    .auth-btn:hover {
      opacity: 0.85;
    }

    .auth-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .auth-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .auth-error {
      background: var(--danger-dim);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      letter-spacing: 0.5px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .auth-tab:hover {
      color: var(--text-primary);
    }

    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">&gt;_ Algomize</div>
        <div class="auth-title">AI Trading Bot</div>
        <div class="auth-subtitle">BTC/USDT — Powered by AI Agents</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">LOG IN</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">SIGN UP</button>
      </div>

      <div class="auth-body">
        <div class="auth-error" id="authError"></div>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="trader@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="Enter password" required>
          </div>
          <button type="submit" class="auth-btn" id="loginBtn">LOG IN</button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signupForm" style="display: none;" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="signupEmail" placeholder="trader@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="signupConfirm" placeholder="Confirm password" required minlength="6">
          </div>
          <button type="submit" class="auth-btn" id="signupBtn">CREATE ACCOUNT</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');
      const authError = document.getElementById('authError');

      authError.style.display = 'none';

      if (tab === 'login') {
        loginForm.style.display = 'flex';
        signupForm.style.display = 'none';
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'flex';
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
      }
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'LOGGING IN...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        localStorage.setItem('userId', data.user.id);
        window.location.href = '/';
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'LOG IN';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const btn = document.getElementById('signupBtn');

      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'CREATING ACCOUNT...';

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Signup failed');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        localStorage.setItem('userId', data.user.id);
        window.location.href = '/';
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT';
      }
    }
  </script>
</body>
</html>
